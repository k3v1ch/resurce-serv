<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заметки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <!-- Шаг 1: email + пароль -->
    <div class="card" id="auth-section">
        <h1>Мои заметки</h1>
        <p class="subtitle">Войдите чтобы управлять заметками</p>

        <div id="auth-message"></div>

        <input type="email" id="email" placeholder="Email" autocomplete="email" />
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password" />

        <button class="btn-primary" onclick="login()">Войти</button>

        <p class="hint">
            Нет аккаунта?
            <a href="javascript:void(0)" onclick="goToRegister()">Зарегистрироваться</a>
        </p>
    </div>

    <!-- Шаг 2: TOTP (показывается только если включена 2FA) -->
    <div class="card" id="totp-section" style="display:none">
        <h1>Двухфакторная аутентификация</h1>
        <p class="subtitle">Введите код из приложения-аутентификатора</p>

        <div id="totp-message"></div>

        <input type="text" id="totp-code" placeholder="6-значный код"
               maxlength="6" inputmode="numeric" autocomplete="one-time-code" />

        <button class="btn-primary" onclick="submitTotp()">Подтвердить</button>
        <button class="btn-back" onclick="backToLogin()">Назад</button>
    </div>

    <!-- Блок заметок -->
    <div id="notes-section">
        <div class="card">
            <div class="user-info">
                <span class="user-email" id="user-email"></span>
                <button class="btn-logout" onclick="logout()">Выйти</button>
            </div>

            <h2>Новая заметка</h2>
            <div id="create-message"></div>

            <input type="text" id="new-title" placeholder="Заголовок" />
            <textarea id="new-content" placeholder="Текст заметки"></textarea>

            <button class="btn-primary" onclick="createNote()">Добавить заметку</button>
        </div>

        <div class="card">
            <h2>Мои заметки</h2>
            <div id="notes-list"></div>
        </div>
    </div>

</div>

<!-- Модальное окно редактирования -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal">
        <h2>Редактировать заметку</h2>

        <input type="text" id="edit-title" placeholder="Заголовок" />
        <textarea id="edit-content" placeholder="Текст заметки"></textarea>

        <div class="modal-actions">
            <button class="btn-edit" onclick="saveEdit()">Сохранить</button>
            <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
